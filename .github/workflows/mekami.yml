name: mekami

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # mekami-api and mekami-core-go are git submodules of this
          # repository, pinned to concrete tags via .gitmodules.
          # actions/checkout only fetches submodule contents when
          # this option is enabled.
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          # Cache the workspace module's go.sum so the build
          # doesn't go cold when only source files changed.
          cache-dependency-path: |
            mekami-cli/go.sum
            mekami-core-go/go.sum
      # Run from the repo root so the committed go.work is in
      # scope. The whole codebase now lives in a single module
      # (mekami-cli), with mekami-core fused in as internal/core
      # so we no longer need to expand per-module patterns.
      - name: Test workspace
        run: |
          go env GOWORK
          go test -short ./mekami-cli/...

  build:
    name: build-${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            mekami-cli/go.sum
            mekami-core-go/go.sum
      # ./build.sh is the project's release script; it is
      # POSIX-shell and only meant to be run on Linux/macOS.
      # On Windows we use a plain go build so the matrix stays
      # green without changing the script.
      - name: Build (unix)
        if: matrix.os != 'windows-latest'
        run: ./build.sh
      - name: Build (windows)
        if: matrix.os == 'windows-latest'
        working-directory: mekami-cli
        run: go build ./...
      # The Mekami repo is the source code of the mekami binary,
      # not a project for the binary to index. ./mekami build and
      # ./mekami mcp-test require a .mekami/config.json in the cwd
      # describing a real indexable project, which this repo does
      # not have (and .gitignore keeps it from being created).
      # End-to-end smoke testing of those commands is done locally
      # against a fixture or a cloned real project, not here.
