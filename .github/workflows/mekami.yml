name: mekami

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # mekami-api and mekami-core-go live in their own repos and
      # are vendored as plain directories in the working copy (not
      # git submodules). actions/checkout only clones the root
      # repository, so we materialise the sibling modules here so
      # the go.work `use` directives and the `replace` directives
      # in mekami-cli/go.mod / mekami-core-go/go.mod can resolve
      # them.
      - name: Materialise sibling modules
        run: |
          set -euo pipefail
          for mod in mekami-api mekami-core-go; do
            if [ ! -f "$mod/go.mod" ]; then
              git clone --depth 1 "https://github.com/Wolf258/${mod}.git" "$mod"
            fi
          done
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          # Cache the workspace module's go.sum so the build
          # doesn't go cold when only source files changed.
          cache-dependency-path: mekami-cli/go.sum
      # Run from the repo root so the committed go.work is in
      # scope. The whole codebase now lives in a single module
      # (mekami-cli), with mekami-core fused in as internal/core
      # so we no longer need to expand per-module patterns.
      - name: Test workspace
        run: |
          go env GOWORK
          go test -short ./mekami-cli/...

  build:
    name: build-${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Materialise sibling modules
        run: |
          set -euo pipefail
          for mod in mekami-api mekami-core-go; do
            if [ ! -f "$mod/go.mod" ]; then
              git clone --depth 1 "https://github.com/Wolf258/${mod}.git" "$mod"
            fi
          done
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            mekami-cli/go.sum
            mekami-core/go.sum
      # ./build.sh is the project's release script; it is
      # POSIX-shell and only meant to be run on Linux/macOS.
      # On Windows we use a plain go build so the matrix stays
      # green without changing the script.
      - name: Build (unix)
        if: matrix.os != 'windows-latest'
        run: ./build.sh
      - name: Build (windows)
        if: matrix.os == 'windows-latest'
        working-directory: mekami-cli
        run: go build ./...
      # The Mekami repo is the source code of the mekami binary,
      # not a project for the binary to index. ./mekami build and
      # ./mekami mcp-test require a .mekami/config.json in the cwd
      # describing a real indexable project, which this repo does
      # not have (and .gitignore keeps it from being created).
      # End-to-end smoke testing of those commands is done locally
      # against a fixture or a cloned real project, not here.
